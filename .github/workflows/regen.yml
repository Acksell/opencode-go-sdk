name: regen

# Automated regeneration of the SDK from upstream opencode. Runs:
#   - On manual trigger (workflow_dispatch)
#   - Weekly on Mondays at 03:00 UTC
#
# The job fails fast if generation fails or the resulting SDK doesn't
# build/test. Only once generate + build + test all pass does it commit the
# regenerated SDK to main, bump the patch version, and cut a GitHub release.
#
# Publishing pushes a commit + tag straight to main. main is protected by a
# repository ruleset, and on a personal repo the only actors that can bypass it
# are real users with the admin role — the default GITHUB_TOKEN
# (github-actions[bot]) is not one, so its push is rejected (GH013). We
# therefore check out (and push) with RELEASE_TOKEN, a PAT belonging to an
# admin, which the ruleset's "repository admins can always bypass" entry
# permits. The bypass comes from the PAT's owner, not github.actor, so this
# behaves identically whether the run is a manual dispatch or the cron.
#
# RELEASE_TOKEN: fine-grained PAT, repo = Acksell/opencode-go-sdk, with
# Contents: read & write. If the secret is absent the expression falls back to
# GITHUB_TOKEN (regen + test still run; only the final publish push fails).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to compute the next version
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: install fern CLI
        run: npm install -g fern-api

      - name: pull + trim + generate
        run: make regen
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}

      - name: build + test generated SDK
        run: make test

      - name: commit, tag, and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Only main may publish. A manual workflow_dispatch can run from any
          # branch — validate generate+test there, but never push/tag/release.
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Ran on ${GITHUB_REF}, not refs/heads/main — skipping publish."
            exit 0
          fi

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes from regeneration — nothing to release."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Bump the patch on the latest sdk/vX.Y.Z tag. The module lives in the
          # sdk/ subdir, so release tags must carry the sdk/ path prefix for
          # `go get github.com/acksell/opencode-go-sdk/sdk@vX.Y.Z` to resolve.
          latest="$(git tag -l 'sdk/v*' | sed 's#^sdk/v##' | sort -V | tail -1)"
          if [ -z "$latest" ]; then
            next="0.1.0"
          else
            IFS=. read -r major minor patch <<<"$latest"
            next="${major}.${minor}.$((patch + 1))"
          fi
          tag="sdk/v${next}"
          echo "Releasing $tag"

          git add -A
          git commit -m "regen: sync from upstream opencode spec ($tag)"
          git push origin HEAD:main

          git tag "$tag"
          git push origin "$tag"

          notes_file="$(mktemp)"
          {
            echo "Automated SDK regeneration from the upstream opencode OpenAPI spec."
            echo
            echo '```'
            echo "go get github.com/acksell/opencode-go-sdk/sdk@$tag"
            echo '```'
          } >"$notes_file"

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes-file "$notes_file"
