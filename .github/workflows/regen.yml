name: regen

# Automated regeneration of the SDK from upstream opencode. Runs:
#   - On manual trigger (workflow_dispatch)
#   - Daily at 03:00 UTC
#
# Each run syncs against the LATEST upstream GitHub release (not the dev
# branch), and the SDK tag mirrors the upstream version: upstream v1.17.18 →
# sdk/v1.17.18. If that tag already exists the run exits early — nothing new
# to sync. Only the latest release is taken; upstream versions published and
# superseded between runs get no tag (gaps are acceptable). GitHub Actions
# cannot subscribe to another repo's release events, hence cron polling.
#
# The job fails fast if generation fails or the resulting SDK doesn't
# build/test. Only once generate + build + test all pass does it commit the
# regenerated SDK to main, tag it with the mirrored version, and cut a GitHub
# release.
#
# Publishing pushes a commit + tag straight to main. main is protected by a
# repository ruleset, and on a personal repo the only actors that can bypass it
# are real users with the admin role — the default GITHUB_TOKEN
# (github-actions[bot]) is not one, so its push is rejected (GH013). We
# therefore check out (and push) with RELEASE_TOKEN, a PAT belonging to an
# admin, which the ruleset's "repository admins can always bypass" entry
# permits. The bypass comes from the PAT's owner, not github.actor, so this
# behaves identically whether the run is a manual dispatch or the cron.
#
# RELEASE_TOKEN: fine-grained PAT, repo = Acksell/opencode-go-sdk, with
# Contents: read & write. If the secret is absent the expression falls back to
# GITHUB_TOKEN (regen + test still run; only the final publish push fails).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history for the already-synced check
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: resolve upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          upstream="$(gh api repos/anomalyco/opencode/releases/latest --jq .tag_name)"
          # If upstream ever ships v2.x, Go requires a /v2 module-path suffix
          # for the mirrored tag to resolve — revisit the scheme then.
          [[ "$upstream" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "unexpected upstream tag: $upstream"; exit 1; }
          tag="sdk/${upstream}"
          skip=false
          # Only skip on main; off-main dispatches always exercise the full
          # generate+test path (publish is blocked off-main anyway).
          if [ "${GITHUB_REF}" = "refs/heads/main" ] && git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "$tag already exists — upstream $upstream already synced."
            skip=true
          fi
          {
            echo "upstream=$upstream"
            echo "tag=$tag"
            echo "skip=$skip"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.upstream.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        if: steps.upstream.outputs.skip != 'true'
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        if: steps.upstream.outputs.skip != 'true'
        with:
          go-version: "1.22"
          cache: false

      - name: install fern CLI
        if: steps.upstream.outputs.skip != 'true'
        run: npm install -g fern-api

      - name: pull + trim + generate
        if: steps.upstream.outputs.skip != 'true'
        run: make regen OPENCODE_REF=${{ steps.upstream.outputs.upstream }}
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}

      - name: build + test generated SDK
        if: steps.upstream.outputs.skip != 'true'
        run: make test

      - name: commit, tag, and release
        if: steps.upstream.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Only main may publish. A manual workflow_dispatch can run from any
          # branch — validate generate+test there, but never push/tag/release.
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Ran on ${GITHUB_REF}, not refs/heads/main — skipping publish."
            exit 0
          fi

          # The SDK tag mirrors the upstream release version. The module lives
          # in the sdk/ subdir, so release tags must carry the sdk/ path prefix
          # for `go get github.com/acksell/opencode-go-sdk/sdk@vX.Y.Z` to resolve.
          upstream="${{ steps.upstream.outputs.upstream }}"
          tag="${{ steps.upstream.outputs.tag }}"
          echo "Releasing $tag (upstream $upstream)"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "regen: sync upstream opencode ${upstream} (${tag})"
            git push origin HEAD:main
          fi

          # Byte-identical output → no commit; tag HEAD anyway. The tag IS the
          # version claim, and multiple sdk tags on one commit are fine for Go.
          git tag "$tag"
          git push origin "$tag"

          notes_file="$(mktemp)"
          {
            echo "Automated SDK regeneration from the upstream opencode OpenAPI spec."
            echo
            echo "Mirrors upstream release [anomalyco/opencode ${upstream}](https://github.com/anomalyco/opencode/releases/tag/${upstream})."
            echo
            echo '```'
            echo "go get github.com/acksell/opencode-go-sdk/sdk@$tag"
            echo '```'
          } >"$notes_file"

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --notes-file "$notes_file"
